<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(61, 47, 47, 0.8), rgba(87, 74, 74, 0)), url(life\ is.jpg);
            background-size: cover;
        }

        nav {
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: white;
        }

        .logo {
            font-size: 29px;
            Letter-spacing: 1px;
            color: white;
            /* background-color: rgb(58 65 65); */
            border-radius: 5px;
            padding: 8px;
            transition: 0.2s;
            text-decoration: none;
        }

        .logo:hover {
            background: transparent;
            border: 1px solid rgb(254, 7, 7);
        }

        .menu a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 20px;
            letter-spacing: 2px;
            position: relative;
        }

        .menu a:before {
            content: '';
            position: absolute;
            top: 0px;
            left: 0px;
            width: 0%;
            height: 100%;
            border-bottom: 2px solid indianred;
            transition: 0.3s linear;
        }

        .menu a:hover:before {
            width: 90%;
        }

        .register a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            letter-spacing: 2px;
            background-color: rgb(164, 45, 45);
            padding: 15px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .register a:hover {
            background: transparent;
            border: 1px solid rgb(164, 45, 45);
        }

        section {
            top: 50%;
            left: 50%;
            position: absolute;
            text-align: center;
            transform: translate(-50%, -50%);

        }

        section a {
            color: white;
            text-decoration: none;
            background-color: rgb(164, 45, 45);
            padding: 10px 20px;
            border-radius: 10px;
            transition: 0.2s;
        }

        section a:hover {
            background: transparent;
            border: 1px solid rgb(164, 45, 45);
        }

        section span {
            color: white;
            font-size: 66px;
        }

        section h1 {
            color: white;
            word-spacing: 28px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <b>Life</b>site🚵‍♂️
            </div>
            <div class="menu">
                <a href="#">HOME</a>
                <a href="#">TRIPSITE</a>
                <a href="#">TOUR TYPE</a>
                <a href="#">CONTECT</a>
                <a href="#">OUR STORY</a>
            </div>
            <div class="register">
                <a href="#">Register</a>
            </div>
        </nav>
        <section>
            <span>Hello Ji</span>
            <h1>LIFE IS ENJOY</h1>
            <br>
            <a href="#">READ MORE</a>
        </section>
    </header>
</body>

</html>
